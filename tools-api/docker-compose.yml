services:
  lanos-tools-api:
    build: .
    container_name: lanos-tools-api
    restart: unless-stopped
    # Same-host sites resolve to this server's own public IP, which a container
    # can't hairpin back to. Route our own domains through the host gateway (the
    # host's Traefik on :443) so checking lanos-logic.com works. External sites
    # (the real use case) resolve normally over the internet.
    extra_hosts:
      - "lanos-logic.com:host-gateway"
      - "www.lanos-logic.com:host-gateway"
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      # HTTPS router, path-scoped so it never shadows the nginx site router.
      - traefik.http.routers.lanostools-https.entrypoints=https
      - traefik.http.routers.lanostools-https.rule=Host(`lanos-logic.com`) && PathPrefix(`/api/tools`)
      - traefik.http.routers.lanostools-https.priority=200
      - traefik.http.routers.lanostools-https.tls=true
      - traefik.http.routers.lanostools-https.tls.certresolver=letsencrypt
      - traefik.http.services.lanostools.loadbalancer.server.port=8090

networks:
  coolify:
    external: true
