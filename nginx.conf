server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root /usr/share/nginx/html;
    add_header X-Robots-Tag "index, follow" always;

    # Compress text assets (JS/CSS/JSON/XML/SVG/feeds). Images are already
    # compressed (WebP/PNG/JPG) and excluded. ~75% smaller JS bundle transfer.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json application/xml application/xml+rss image/svg+xml text/yaml application/yaml application/manifest+json;

    # MCP protocol (JSON-RPC 2.0)
    location = /mcp {
        proxy_pass http://lanos-mcp-server:8001/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # REST API (OpenAPI-compatible)
    location /tools/ {
        proxy_pass http://lanos-mcp-server:8001/tools/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Static files
    location = /robots.txt  { try_files /robots.txt =404; add_header Content-Type text/plain; }
    location = /sitemap.xml { try_files /sitemap.xml =404; add_header Content-Type application/xml; }
    location = /llms.txt    { try_files /llms.txt =404; add_header Content-Type "text/plain; charset=utf-8"; }
    location = /llms-full.txt { try_files /llms-full.txt =404; add_header Content-Type "text/plain; charset=utf-8"; }
    location = /llm.txt     { return 301 /llms.txt; }
    location = /openapi.yaml { try_files /openapi.yaml =404; add_header Content-Type "text/yaml; charset=utf-8"; add_header Access-Control-Allow-Origin "*"; }

    # .well-known (AI/MCP/A2A discovery)
    location /.well-known/ {
        alias /usr/share/nginx/html/.well-known/;
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        index  index.html index.htm;
        # Serve prerendered per-route index.html directly (e.g.
        # /services/voice-ai-agents -> /services/voice-ai-agents/index.html)
        # WITHOUT a trailing-slash 301. The default `$uri/` would redirect to
        # the slash form and, behind Traefik TLS termination, downgrade the
        # scheme to http — producing an https->http->https chain. Matching the
        # non-slash canonical/sitemap URLs avoids that.
        try_files $uri $uri/index.html /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
